name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build release artifacts
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -v

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          uv run python - <<'PY'
          import json
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          manifest = json.loads(Path("manifest.json").read_text())
          version = pyproject["project"]["version"]
          if tag != version:
              raise SystemExit(f"Tag v{tag} does not match pyproject version {version}")
          if manifest["version"] != version:
              raise SystemExit(
                  f"manifest version {manifest['version']} does not match {version}"
              )
          PY

      - name: Build Python package
        run: uv build

      - name: Pack MCPB bundle
        run: npx --yes @anthropic-ai/mcpb pack

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-artifacts
          path: |
            dist/*.tar.gz
            dist/*.whl
            *.mcpb
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
            *.mcpb

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/arc-browser-mcp
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Publish Python package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-artifacts/dist
